name: Deploy to DreamHost

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'CHANGES.md'
      - 'supabase/**'
      - 'scripts/generate-default-list-sql.mjs'
      - '.vscode/**'
      - '.cursor/**'
  workflow_dispatch:

# No concurrency lock: a stuck “queued” run was blocking all later deploys for
# this group (cancel-in-progress does not clear queued). Rsync races are rare.

jobs:
  deploy:
    name: Build & rsync to top100sf.com
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build dist/
        run: npm run dist

      # Injects the browser Places key into dist/index.html from a repo secret (never commit the key).
      - name: Inject Google Places API key into dist/index.html
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: node scripts/inject-google-places-dist.mjs

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DREAMHOST_SSH_KEY }}
          SSH_HOST: ${{ secrets.DREAMHOST_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy via rsync
        env:
          SSH_HOST: ${{ secrets.DREAMHOST_HOST }}
          SSH_USER: ${{ secrets.DREAMHOST_USER }}
          REMOTE_PATH: ${{ secrets.DREAMHOST_PATH }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes" \
            --exclude '.DS_Store' \
            --exclude '.dh-diag' \
            --exclude 'favicon.gif' \
            --exclude 'favicon.ico' \
            --exclude 'logs/' \
            dist/ "${SSH_USER}@${SSH_HOST}:${REMOTE_PATH}"

      - name: Summary
        run: echo "Deployed to https://top100sf.com" >> $GITHUB_STEP_SUMMARY
